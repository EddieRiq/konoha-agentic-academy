name: Konoha CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit and integrated dry-run checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Run integrated dry-run smoke tests
        run: |
          python tools/integration/run_integrated_smoke_tests.py \
            --repo-root "." \
            --sandbox-root "sandbox" \
            --run-id "ci-integrated-smoke" \
            --json
